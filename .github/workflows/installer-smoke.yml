name: Installer Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to install, for example v0.1.7-alpha. Defaults to latest release."
        required: false
        type: string
  release:
    types: [published]
  schedule:
    - cron: "23 3 * * *"

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install from README command (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          KIKO_INSTALL_DIR: ${{ runner.temp }}/kiko-bin
          KIKO_VERSION: ${{ github.event.release.tag_name || inputs.version || '' }}
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/suir1/kiko/main/scripts/install.sh | sh
          "$KIKO_INSTALL_DIR/kiko" --help
          "$KIKO_INSTALL_DIR/kiko" doctor --help

      - name: Install from README command (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          KIKO_INSTALL_DIR: ${{ runner.temp }}\kiko-bin
          KIKO_VERSION: ${{ github.event.release.tag_name || inputs.version || '' }}
        run: |
          irm https://raw.githubusercontent.com/suir1/kiko/main/scripts/install.ps1 | iex
          & "$env:KIKO_INSTALL_DIR\kiko.exe" --help
          & "$env:KIKO_INSTALL_DIR\kiko.exe" doctor --help
