name: Docker Netlab

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * 0"

permissions:
  contents: read

concurrency:
  group: docker-netlab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  netlab:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run Docker network lab matrix
        run: scripts/netlab_matrix.sh
