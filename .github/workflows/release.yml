name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild, for example v0.2.2-alpha."
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  ABI_CHECK_SCRIPT: ${{ github.event_name == 'workflow_dispatch' && '.release-tools/scripts/check_linux_abi.sh' || 'scripts/check_linux_abi.sh' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: linux-x64
            archive: tar.gz
          - os: macos-latest
            asset: macos-arm64
            archive: tar.gz
          - os: macos-15-intel
            asset: macos-x64
            archive: tar.gz
          - os: windows-latest
            asset: windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout release tools
        uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ github.sha }}
          path: .release-tools
          sparse-checkout: scripts/check_linux_abi.sh
          sparse-checkout-cone-mode: false

      - name: Install system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'Linux'

      - name: Install system dependencies (macOS)
        run: brew install ninja autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'macOS'

      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
        shell: bash
        if: runner.os != 'Windows'

      - name: Install vcpkg (Windows)
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          .\.vcpkg\bootstrap-vcpkg.bat
        if: runner.os == 'Windows'

      - name: Configure
        run: cmake --preset local-vcpkg
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
        if: runner.os != 'Windows'

      - name: Configure (Windows)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\.vcpkg\scripts\buildsystems\vcpkg.cmake"
        if: runner.os == 'Windows'

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --preset local-vcpkg -C Release --output-on-failure
        if: runner.os != 'Windows'

      - name: Test (Windows)
        run: ctest --test-dir build -C Release --output-on-failure
        if: runner.os == 'Windows'

      - name: Check Linux ABI baseline
        run: bash "$ABI_CHECK_SCRIPT" build/kiko build/kiko-relayd
        if: runner.os == 'Linux'

      - name: Package
        run: |
          set -euo pipefail
          name="kiko-${RELEASE_TAG}-${{ matrix.asset }}"
          mkdir -p "dist/${name}"
          cp build/kiko "dist/${name}/"
          cp build/kiko-relayd "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
        shell: bash
        if: runner.os != 'Windows'

      - name: Package (Windows)
        run: |
          $name = "kiko-${env:RELEASE_TAG}-${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "build/kiko.exe" "dist/$name/"
          Copy-Item "build/kiko-relayd.exe" "dist/$name/"
          Copy-Item "build/*.dll" "dist/$name/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "dist/$name/"
          Copy-Item "LICENSE" "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip" -Force
        if: runner.os == 'Windows'

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: kiko-${{ matrix.asset }}
          path: dist/kiko-${{ env.RELEASE_TAG }}-${{ matrix.asset }}.${{ matrix.archive }}

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container: ubuntu:22.04

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            autoconf autoconf-archive automake binutils build-essential ca-certificates cmake curl git \
            libtool ninja-build pkg-config tar unzip zip

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout release tools
        uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ github.sha }}
          path: .release-tools
          sparse-checkout: scripts/check_linux_abi.sh
          sparse-checkout-cone-mode: false

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
        shell: bash

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build/vcpkg_installed
          key: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-vcpkg-

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Check Linux ABI baseline
        run: bash "$ABI_CHECK_SCRIPT" build/kiko build/kiko-relayd

      - name: Package
        run: |
          set -euo pipefail
          name="kiko-${RELEASE_TAG}-linux-arm64"
          mkdir -p "dist/${name}"
          cp build/kiko "dist/${name}/"
          cp build/kiko-relayd "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
        shell: bash

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: kiko-linux-arm64
          path: dist/kiko-${{ env.RELEASE_TAG }}-linux-arm64.tar.gz

  publish:
    needs: [build, build-linux-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          prerelease_args=()
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            prerelease_args+=(--prerelease)
          fi
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes "${prerelease_args[@]}"
          gh release upload "$TAG" dist/* --clobber
