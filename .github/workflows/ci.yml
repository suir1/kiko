name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
        shell: bash
        if: runner.os != 'Windows'

      - name: Install vcpkg (Windows)
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          .\.vcpkg\bootstrap-vcpkg.bat
        if: runner.os == 'Windows'

      - name: Configure
        run: cmake --preset local-vcpkg
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --preset local-vcpkg -C Release --output-on-failure

  relay-smoke:
    runs-on: ubuntu-latest
    if: vars.KIKO_RELAY_SMOKE != ''
    steps:
      - uses: actions/checkout@v4
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
      - name: Configure and build
        run: |
          cmake --preset local-vcpkg
          cmake --build build --config Release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      - name: Smoke ping public relay
        run: ./build/kiko doctor --relay "${{ vars.KIKO_RELAY_SMOKE }}"
        env:
          KIKO_RELAY_PASS: ${{ secrets.KIKO_RELAY_PASS }}
