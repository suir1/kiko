name: CI Fast

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'Linux'

      - name: Cache Playwright Chromium (Ubuntu)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-chromium-1.52.0
        if: matrix.os == 'ubuntu-latest'

      - name: Install browser smoke dependencies (Ubuntu)
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check playwright==1.52.0
          .venv/bin/python -m playwright install --with-deps chromium
        if: matrix.os == 'ubuntu-latest'

      - name: Install system dependencies (macOS)
        run: brew install ninja autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'macOS'

      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
        shell: bash
        if: runner.os != 'Windows'

      - name: Install vcpkg (Windows)
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          .\.vcpkg\bootstrap-vcpkg.bat
        if: runner.os == 'Windows'

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build/vcpkg_installed
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Configure
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cmake --preset local-vcpkg -DPython3_EXECUTABLE="$GITHUB_WORKSPACE/.venv/bin/python"
          else
            cmake --preset local-vcpkg
          fi
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
        if: runner.os != 'Windows'

      - name: Configure (Windows)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\.vcpkg\scripts\buildsystems\vcpkg.cmake"
        if: runner.os == 'Windows'

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --preset local-vcpkg -C Release --output-on-failure
        env:
          KIKO_REQUIRE_BROWSER_SMOKE: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}
        if: runner.os != 'Windows'

      - name: Test (Windows)
        run: ctest --test-dir build -C Release --output-on-failure
        if: runner.os == 'Windows'
