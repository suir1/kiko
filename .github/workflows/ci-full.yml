name: CI Full

on:
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'Linux'

      - name: Cache Playwright Chromium (Ubuntu)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-chromium-1.52.0
        if: matrix.os == 'ubuntu-latest'

      - name: Install browser smoke dependencies (Ubuntu)
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check playwright==1.52.0
          .venv/bin/python -m playwright install --with-deps chromium
        if: matrix.os == 'ubuntu-latest'

      - name: Install system dependencies (macOS)
        run: brew install ninja autoconf autoconf-archive automake libtool pkg-config
        if: runner.os == 'macOS'

      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
        shell: bash
        if: runner.os != 'Windows'

      - name: Install vcpkg (Windows)
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          .\.vcpkg\bootstrap-vcpkg.bat
        if: runner.os == 'Windows'

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build/vcpkg_installed
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Configure
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cmake --preset local-vcpkg -DPython3_EXECUTABLE="$GITHUB_WORKSPACE/.venv/bin/python"
          else
            cmake --preset local-vcpkg
          fi
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
        if: runner.os != 'Windows'

      - name: Configure (Windows)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\.vcpkg\scripts\buildsystems\vcpkg.cmake"
        if: runner.os == 'Windows'

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --preset local-vcpkg -C Release --output-on-failure
        env:
          KIKO_REQUIRE_BROWSER_SMOKE: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}
        if: runner.os != 'Windows'

      - name: Test (Windows)
        run: ctest --test-dir build -C Release --output-on-failure
        if: runner.os == 'Windows'

  sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build-sanitize/vcpkg_installed
          key: sanitizer-${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            sanitizer-${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Configure sanitizer build
        run: cmake --preset sanitize

      - name: Build sanitizer targets
        run: cmake --build --preset sanitize

      - name: Test with ASan and UBSan
        run: ctest --preset sanitize

  relay-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: vars.KIKO_RELAY_SMOKE != ''
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh
      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build/vcpkg_installed
          key: relay-smoke-${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            relay-smoke-${{ runner.os }}-${{ runner.arch }}-vcpkg-
      - name: Configure and build
        run: |
          cmake --preset local-vcpkg
          cmake --build build --config Release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      - name: Smoke ping public relay
        run: ./build/kiko doctor --relay "${{ vars.KIKO_RELAY_SMOKE }}"
        env:
          KIKO_RELAY_PASS: ${{ secrets.KIKO_RELAY_PASS }}
      - name: Smoke transfer through public relay
        run: python3 scripts/relay_transfer_smoke.py ./build/kiko --relay "${{ vars.KIKO_RELAY_SMOKE }}"
        env:
          KIKO_RELAY_PASS: ${{ secrets.KIKO_RELAY_PASS }}

  android-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf autoconf-archive automake file libtool pkg-config

      - name: Select Android NDK
        run: |
          ndk="${ANDROID_NDK_LATEST_HOME:-}"
          if [ -z "$ndk" ]; then
            ndk=$(find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          fi
          test -f "$ndk/build/cmake/android.toolchain.cmake"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          ./.vcpkg/bootstrap-vcpkg.sh

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/installed
            build-android/vcpkg_installed
          key: android-arm64-vcpkg-${{ hashFiles('vcpkg.json', 'cmake/triplets/arm64-android-termux.cmake') }}

      - name: Configure
        run: >-
          cmake -S . -B build-android -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/cmake/triplets"
          -DVCPKG_TARGET_TRIPLET=arm64-android-termux
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=24 -DANDROID_STL=c++_static
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg

      - name: Build
        run: cmake --build build-android --target kiko

      - name: Inspect Android executable
        run: |
          file build-android/kiko | grep -E 'ELF 64-bit.*ARM aarch64'
          readelf="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          "$readelf" -l build-android/kiko | grep '/system/bin/linker64'
          "$readelf" -d build-android/kiko
